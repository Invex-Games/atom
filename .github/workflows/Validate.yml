name: Validate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: { }

jobs:

  SetupBuildInfo:
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.SetupBuildInfo.outputs.build-name }}
      build-id: ${{ steps.SetupBuildInfo.outputs.build-id }}
      build-version: ${{ steps.SetupBuildInfo.outputs.build-version }}
      build-timestamp: ${{ steps.SetupBuildInfo.outputs.build-timestamp }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: SetupBuildInfo
        id: SetupBuildInfo
        run: dotnet run --project _atom/_atom.csproj -- SetupBuildInfo --skip --headless

  PackProjects:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: PackProjects
        id: PackProjects
        run: dotnet run --project _atom/_atom.csproj -- PackProjects --skip --headless

  PackTool:
    runs-on: ${{ matrix.job-runs-on }}
    strategy:
      matrix:
        job-runs-on:
          - windows-latest
          - windows-11-arm
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: PackTool
        id: PackTool
        run: dotnet run --project _atom/_atom.csproj -- PackTool --skip --headless
        env:
          job-runs-on: ${{ matrix.job-runs-on }}
          build-slice: ${{ matrix.job-runs-on }}

  TestProjects:
    runs-on: ${{ matrix.job-runs-on }}
    strategy:
      matrix:
        job-runs-on:
          - windows-latest
          - windows-11-arm
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
        test-framework: [ net8.0, net9.0, net10.0 ]
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup .NET 8.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: TestProjects
        id: TestProjects
        run: dotnet run --project _atom/_atom.csproj -- TestProjects --skip --headless
        env:
          job-runs-on: ${{ matrix.job-runs-on }}
          test-framework: ${{ matrix.test-framework }}
          build-slice: '${{ matrix.job-runs-on }}-${{ matrix.test-framework }}'

  BuildDocs:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: BuildDocs
        id: BuildDocs
        run: dotnet run --project _atom/_atom.csproj -- BuildDocs --skip --headless

  CheckPrForBreakingChanges:
    permissions:
      checks: write
      contents: write
      id-token: write
      pull-requests: write
    needs: [ SetupBuildInfo ]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: CheckPrForBreakingChanges
        id: CheckPrForBreakingChanges
        run: dotnet run --project _atom/_atom.csproj -- CheckPrForBreakingChanges --skip --headless
        env:
          build-version: ${{ needs.SetupBuildInfo.outputs.build-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.number }}

  WaitForCopilotReview:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: WaitForCopilotReview
        id: WaitForCopilotReview
        run: dotnet run --project _atom/_atom.csproj -- WaitForCopilotReview --skip --headless
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.number }}

